<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gabber Options</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Display Options</h1>
    <div class="option">
      <label>
        <input type="radio" name="displayPreference" value="pageAction" />
        Page action only
      </label>
    </div>
    <div class="option">
      <label>
        <input type="radio" name="displayPreference" value="contextMenu" />
        Context menu only
      </label>
    </div>
    <div class="option">
      <label>
        <input type="radio" name="displayPreference" value="both" />
        Both page action and context menu
      </label>
    </div>
    <script type="module" src="options.js"></script>
  </body>
</html>
